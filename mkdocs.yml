site_name: Multidisciplinary Cost-Benefit Optimization Models (MCBOMs)
site_description: Multidisciplinary Cost-Benefit Optimization Models
site_author: Texas A&M Transportation Institute
site_url: https://ttitamu.github.io/mcboms-optimization/

copyright: Texas A&M Transportation Institute

theme:
  name: material
  logo: assets/tti_mark.png
  favicon: assets/tti_mark.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - docs
        - models
        - src
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  generator: false

nav:
  - Home: index.md
  - Overview: overview.md
  - Mathematical Formulation:
      - formulation/index.md
      - Project-Level MILP: formulation/project-level.md
      - Network-Level Extensions: formulation/network-level.md
      - Safety Benefit: formulation/safety.md
      - Operational Benefit: formulation/operations.md
      - Corridor Condition Benefit: formulation/ccm.md
      - MCBOMs Methodology (PDF): formulation/methodology.md
  - Validation:
      - validation/index.md
      - Worked Example: validation/worked-example.md
      - Harwood (2003): validation/harwood.md
      - Banihashemi (2007): validation/banihashemi.md
  - Solver Models:
      - models/index.md
      - AMPL: models/ampl.md
      - GAMS: models/gams.md
      - LP Format: models/lp.md
      - Excel: models/excel/index.md
  - Python Implementation:
      - python/index.md
      - Installation: python/installation.md
      - Architecture: python/architecture.md
      - Extending the Framework: python/extending.md
  - Reference:
      - reference/index.md
      - Default Parameters: reference/parameters.md
      - Scope of this prototype: reference/status.md
      - Troubleshooting: reference/troubleshooting.md
      - Glossary: reference/glossary.md
      - Harwood (2003) Methodology Notes: reference/harwood-methodology.md
      - Banihashemi (2007) Methodology Notes: reference/banihashemi-methodology.md
      - Bibliography: reference/bibliography.md
