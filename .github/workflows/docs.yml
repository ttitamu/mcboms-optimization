name: Deploy documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'models/**'
      - 'src/**'
      - 'tests/**'
      - 'examples/**'
      - 'run_harwood_validation.py'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs and dependencies
        run: |
          pip install mkdocs-material mkdocs-minify-plugin pymdown-extensions

      - name: Build site
        run: mkdocs build --strict

      - name: Set up Node.js for staticrypt
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install staticrypt
        run: npm install -g staticrypt

      - name: Encrypt site with staticrypt
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          if [ -z "$STATICRYPT_PASSWORD" ]; then
            echo "::error::STATICRYPT_PASSWORD secret is not set. Add it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          # Encrypt the entire built site recursively. The output goes to
          # encrypted_site/site/... so we then move it back to replace site/.
          # --short suppresses the short-password warning.
          # --remember 7 sets the Remember-me expiration to 7 days.
          # --template-color-* applies our maroon theme to the prompt.
          staticrypt site \
            --password "$STATICRYPT_PASSWORD" \
            --recursive \
            --short \
            --remember 7 \
            --template-color-primary '#500000' \
            --template-color-secondary '#6B0E1A' \
            --template-title 'MCBOMs Optimization' \
            --template-instructions 'This site is restricted. Please enter the access password.' \
            --template-button 'Open' \
            -d encrypted_site
          # Replace the plaintext site/ with the encrypted version
          rm -rf site
          mv encrypted_site/site site
          rm -rf encrypted_site
          # Pre-check the "Remember me" checkbox in every encrypted page so
          # reviewers don't get re-prompted on every navigation. The flag is
          # opt-out: reviewers can uncheck it if they want session-only auth.
          find site -name '*.html' -exec sed -i 's|<input id="staticrypt-remember" type="checkbox" name="remember" />|<input id="staticrypt-remember" type="checkbox" name="remember" checked />|g' {} +
          echo "Encryption complete. Encrypted file count:"
          find site -name '*.html' | wc -l

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
